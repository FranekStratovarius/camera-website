{{template "header" .}}
<div class="d-flex justify-content-between align-items-center mb-3">
	<h2 class="mb-0">{{.DayNameFormatted}} um {{.HourName}} Uhr</h2>
	<a class="btn btn-secondary" href="/cameras/{{ $.CameraName }}/{{.DayName}}">
			zurück
	</a>
</div>

<ul class="list-group">
	{{range $index, $clip := .Clips}}
	<div class="list-group-item">
		{{ .Time }}
		<div id="vid-{{$index}}">
			{{ if eq .Converted false }}
				<button
					class="btn btn-primary"
					hx-get="/start-convert/{{ $.CameraName }}/{{ $.DayName }}/{{ $.VideoName }}/{{ $.HourName }}/{{$clip.ClipName}}.mp4"
					hx-trigger="click"
					hx-target="#vid-{{$index}}"
					hx-swap="outerHTML">
					Lade Video
				</button>
			{{ else }}
				<video width="100%" controls>
					<source src="/converted/{{ $.CameraName }}/{{ $.DayName }}/{{ $.VideoName }}/{{ $.HourName }}/{{$clip.ClipName}}.mp4" type="video/mp4">
				</video>
			{{ end }}
		</div>
	</div>
	{{end}}
</ul>
