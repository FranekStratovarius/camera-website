{{template "header" .}}
<div class="d-flex justify-content-between align-items-center mb-3">
	<h2 class="mb-0">Stunden von {{.DayNameFormatted}}</h2>
	<a class="btn btn-secondary" href="/cameras/{{ $.CameraName }}">
			zurück
	</a>
</div>
<ul class="list-group">
	{{range .Hours}}
		<a class="list-group-item" href="/cameras/{{ $.CameraName }}/{{ $.DayName }}/{{.HourName}}">
			{{.HourName}} Uhr
		</a>
	{{end}}
</ul>
{{template "footer" .}}
