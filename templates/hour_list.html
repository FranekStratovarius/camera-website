{{template "header" .}}
<h2>Stunden von {{.DayName}}</h2>
<a href="/cameras/{{ $.CameraName }}">
	<button>	
		zurück
	</button>
</a>
<ul>
	{{range .Hours}}
		<li>
			<a href="/cameras/{{ $.CameraName }}/{{ $.DayName }}/{{.VideoDirectory}}/{{.HourName}}">
				<button>	
					{{.HourName}}
				</button>
			</a>
		</li>
	{{end}}
</ul>
